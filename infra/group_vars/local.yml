# Variabili specifiche dell'ambiente locale (gruppo `local`).
# In produzione ci sarà un group_vars/prod.yml gemello con i domini veri
# (es. "tabletnexus.com"): Caddy userà l'HTTPS automatico senza altre modifiche.

# Siti serviti da Caddy. Per il locale usiamo domini .test su HTTP:
# lo schema http:// disattiva il TLS automatico (niente Let's Encrypt).
#   slug    -> cartella sorgente sites/<slug> (workspace da buildare)
#   address -> indirizzo Caddy
#   root    -> docroot servita
sites:
  - slug: tabletnexus
    address: "http://tabletnexus.test"
    root: /var/www/tabletnexus

---
# Ruolo node: Node.js LTS + npm dal repository NodeSource, per le build Astro.

- name: Installa i prerequisiti per il repository NodeSource
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Crea la cartella dei keyring apt
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Scarica la chiave GPG di NodeSource
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: Configura il repository NodeSource
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ nodejs_major }}.x nodistro main"
    filename: nodesource
    state: present

- name: Installa Node.js (include npm)
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Rileva le versioni installate
  ansible.builtin.command: "{{ item }} --version"
  register: node_versions
  changed_when: false
  loop:
    - node
    - npm

- name: Mostra le versioni di Node e npm
  ansible.builtin.debug:
    msg: "node {{ node_versions.results[0].stdout }} · npm {{ node_versions.results[1].stdout }}"
